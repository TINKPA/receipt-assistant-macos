name: ReceiptAssistant
options:
  bundleIdPrefix: com.tinkpa
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
packages:
  swift-openapi-runtime:
    url: https://github.com/apple/swift-openapi-runtime
    from: 1.5.0
  swift-openapi-urlsession:
    url: https://github.com/apple/swift-openapi-urlsession
    from: 1.0.0
  swift-openapi-generator:
    url: https://github.com/apple/swift-openapi-generator
    from: 1.0.0
targets:
  ReceiptAssistant:
    type: application
    platform: macOS
    sources:
      - path: ReceiptAssistant
    dependencies:
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-openapi-urlsession
        product: OpenAPIURLSession
    buildToolPlugins:
      - plugin: OpenAPIGenerator
        package: swift-openapi-generator
    info:
      path: ReceiptAssistant/Info.plist
      properties:
        CFBundleDisplayName: Receipt Assistant
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: ReceiptAssistant/ReceiptAssistant.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinkpa.ReceiptAssistant
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: ReceiptAssistant/ReceiptAssistant.entitlements
